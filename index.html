/* ---------- 匯出 / 匯入 Smart Merge ---------- */
const EXPORT_STORES=['accounts','categories','transactions','securities','recurringTemplates','budgets'];
/* 這些 settings 鍵是「本機/裝置專屬」的同步機器狀態,匯入或雲端合併時一律保留本機值,不被遠端覆蓋 */
const SYNC_LOCAL_SETTING_KEYS = new Set(['lastExportAt','gdrive.clientId','gdrive.fileId','gdrive.connected','gdrive.lastSyncAt','gdrive.token']);
async function buildExport(){
  const data={};
  for(const s of EXPORT_STORES) data[s]=await idbGetAll(s);   // 含 tombstone,合併需要
  data.settings=await idbGetAll('settings');
  return { schemaVersion:SCHEMA_VERSION, exportedAt:now(), app:'個人記帳', data };
}
function downloadJSON(obj,filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
}
function stamp(){ const d=new Date(); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`; }
async function exportAll(silent){
  const dump=await buildExport();
  downloadJSON(dump, `ledger-backup-${stamp()}.json`);
  await setSetting('lastExportAt', now()); state.lastExportAt=now();
  if(!silent){ render(); toast('已匯出備份 ✓'); }
}
function handleImportFile(file){
  const reader=new FileReader();
  reader.onload=async()=>{
    let parsed;
    try{ parsed=JSON.parse(reader.result); }catch(e){ return toast('檔案格式錯誤,無法解析'); }
    if(!parsed || !parsed.data || typeof parsed.data!=='object') return toast('這不是有效的備份檔');
    // 先做安全備份
    await exportAll(true);
    const plan=await computeMergePlan(parsed);
    showImportPreview(parsed, plan);
  };
  reader.onerror=()=>toast('讀取檔案失敗');
  reader.readAsText(file);
}
async function computeMergePlan(parsed){
  let add=0, upd=0, skip=0; const plan={};
  for(const st of EXPORT_STORES){
    const incoming=Array.isArray(parsed.data[st])?parsed.data[st]:[];
    const existing=await idbGetAll(st);
    const map=new Map(existing.map(r=>[r.id,r]));
    const writes=[];
    for(const rec of incoming){
      if(!rec || rec.id==null){ continue; }
      const cur=map.get(rec.id);
      if(!cur){ add++; writes.push(rec); }
      else if((rec.updatedAt||0)>(cur.updatedAt||0)){ upd++; writes.push(rec); }
      else skip++;
    }
    plan[st]=writes;
  }
  return {add,upd,skip,plan,settings:Array.isArray(parsed.data.settings)?parsed.data.settings:[]};
}
function showImportPreview(parsed,plan){
  const ver=parsed.schemaVersion;
  const verWarn = ver!=null && ver>SCHEMA_VERSION ? `<div class="desc" style="color:var(--invest);margin-bottom:8px">⚠ 備份 schema v${ver} 高於目前 v${SCHEMA_VERSION},部分欄位可能無法辨識</div>` : '';
  const html=`
    <h3>匯入預覽</h3>
    ${verWarn}
    <div class="desc" style="margin-bottom:10px">已自動下載一份目前資料作為安全備份。合併規則:相同 id 取 updatedAt 較新者,刪除以 tombstone 保留。</div>
    <div class="card" style="padding:6px 0;margin-bottom:6px">
      <div class="stat3">
        <div><div class="v" style="color:var(--income)">${plan.add}</div><div class="k">新增</div></div>
        <div><div class="v" style="color:var(--accent)">${plan.upd}</div><div class="k">更新</div></div>
        <div><div class="v" style="color:var(--text-faint)">${plan.skip}</div><div class="k">略過</div></div>
      </div>
    </div>
    <div class="desc">來源匯出時間:${parsed.exportedAt?new Date(parsed.exportedAt).toLocaleString():'—'}</div>
    <div class="sheet-actions"><button class="btn-ghost" id="im-cancel">取消</button><button class="btn-primary" id="im-go" style="margin-top:0">確認匯入</button></div>`;
  openSheet(html,()=>{
    $('#im-cancel').onclick=closeSheet;
    $('#im-go').onclick=async()=>{
      for(const st of EXPORT_STORES){ for(const rec of plan.plan[st]){ await idbPut(st,rec); } }
      // settings:逐 key 合併,匯入值優先(但保留本機專屬鍵,見 SYNC_LOCAL_SETTING_KEYS)
      for(const kv of plan.settings){ if(kv&&kv.key!=null&&!SYNC_LOCAL_SETTING_KEYS.has(kv.key)) await idbPut('settings',kv); }
      await refresh(); closeSheet(); render(); toast(`匯入完成 · 新增 ${plan.add}、更新 ${plan.upd}`);
    };
  });
}
/* ============================================================
   Google Drive 雲端同步(appDataFolder)
   沿用 buildExport() / computeMergePlan(),不另外發明合併邏輯:
   下載遠端 JSON → 當作「匯入資料」跑 computeMergePlan → 套用到本機
   → 再 buildExport() 一次 → 把合併後的完整資料上傳回去。
   ============================================================ */
const GIS_SRC = 'https://accounts.google.com/gsi/client';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILES_URL = 'https://www.googleapis.com/drive/v3/files';
const DRIVE_UPLOAD_URL = 'https://www.googleapis.com/upload/drive/v3/files';
const SYNC_FILE_NAME = 'ledger-sync.json';
const SYNC_DEBOUNCE_MS = 3000;
let syncInProgress = false;

function loadScriptOnce(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)) return res();
    const s=document.createElement('script');
    s.src=src; s.async=true;
    s.onload=()=>res();
    s.onerror=()=>rej(new Error('外部函式庫載入失敗(可能離線):'+src));
    document.head.appendChild(s);
  });
}
async function ensureGIS(){
  if(state.sync.gisLoaded) return true;
  if(state.sync.gisLoadFailed) return false;
  try{ await loadScriptOnce(GIS_SRC); state.sync.gisLoaded=true; return true; }
  catch(e){ state.sync.gisLoadFailed=true; return false; }
}
function ensureTokenClient(clientId){
  if(!window.google || !google.accounts || !google.accounts.oauth2) throw new Error('Google 登入元件尚未就緒');
  if(state.sync.tokenClient && state.sync.tcClientId===clientId) return state.sync.tokenClient;
  const tc = google.accounts.oauth2.initTokenClient({ client_id: clientId, scope: DRIVE_SCOPE, callback: ()=>{} });
  state.sync.tokenClient=tc; state.sync.tcClientId=clientId;
  return tc;
}
function requestAccessToken(clientId){
  return new Promise(async (resolve,reject)=>{
    const ok=await ensureGIS();
    if(!ok) return reject(new Error('離線或無法載入 Google 登入元件,請確認網路連線'));
    let tc; try{ tc=ensureTokenClient(clientId); }catch(e){ return reject(e); }
    tc.callback=(resp)=>{
      if(resp && resp.access_token){
        state.sync.accessToken=resp.access_token;
        state.sync.tokenExpireAt = now() + (Number(resp.expires_in||3600)-60)*1000;
        // 持久化 token:手機 PWA 常被系統回收、桌面重新整理也會丟記憶體;
        // 存起來讓 1 小時效期內重開 App 不必重新彈窗授權(裝置專屬鍵,不隨雲端合併)
        setSetting('gdrive.token',{accessToken:resp.access_token, expireAt:state.sync.tokenExpireAt}).catch(()=>{});
        resolve(resp.access_token);
      } else reject(new Error((resp && resp.error) || '取得 Google 授權失敗'));
    };
    tc.error_callback=(err)=>reject(new Error((err && err.message) || '授權視窗被關閉或失敗'));
    // prompt:'' — 已授權過的帳號通常彈窗一閃即自動關閉;首次連結才會出現完整同意畫面
    tc.requestAccessToken({ prompt:'' });
  });
}
async function getValidAccessToken(clientId){
  if(state.sync.accessToken && now() < state.sync.tokenExpireAt) return state.sync.accessToken;
  return await requestAccessToken(clientId);
}
function isPopupBlockedError(err){
  const m=(err && err.message || '').toLowerCase();
  return m.includes('popup') || m.includes('failed to open');
}

async function driveFindFile(token){
  const q=encodeURIComponent(`name='${SYNC_FILE_NAME}' and trashed=false`);
  const res=await fetch(`${DRIVE_FILES_URL}?spaces=appDataFolder&q=${q}&fields=files(id,name)`,{headers:{Authorization:'Bearer '+token}});
  if(!res.ok) throw new Error('Drive 查詢失敗 ('+res.status+')');
  const j=await res.json();
  return (j.files && j.files[0]) ? j.files[0].id : null;
}
async function driveCreateFile(token, content){
  const metadata={name:SYNC_FILE_NAME, parents:['appDataFolder']};
  const boundary='ledgersync'+uid();
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`
    +`--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  const res=await fetch(`${DRIVE_UPLOAD_URL}?uploadType=multipart&fields=id`,{
    method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':`multipart/related; boundary=${boundary}`}, body });
  if(!res.ok) throw new Error('Drive 建立檔案失敗 ('+res.status+')');
  return (await res.json()).id;
}
async function driveDownloadFile(token, fileId){
  const res=await fetch(`${DRIVE_FILES_URL}/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
  if(res.status===404) return null;
  if(!res.ok) throw new Error('Drive 下載失敗 ('+res.status+')');
  return await res.text();
}
async function driveUpdateFile(token, fileId, content){
  const res=await fetch(`${DRIVE_UPLOAD_URL}/${fileId}?uploadType=media`,{
    method:'PATCH', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}, body:content });
  if(!res.ok) throw new Error('Drive 更新失敗 ('+res.status+')');
}

function scheduleSync(){
  if(syncInProgress) return;                 // 避免同步流程內部的 refresh() 觸發自我遞迴
  clearTimeout(state.sync.debounceTimer);
  state.sync.debounceTimer=setTimeout(()=>{ syncNow().catch(()=>{}); }, SYNC_DEBOUNCE_MS);
}
async function syncNow(opts={}){
  const allowInteractive=!!opts.allowInteractive;
  if(syncInProgress) return;
  const clientId = state.sync.clientId || await getSetting('gdrive.clientId','');
  if(!clientId){ state.sync.status='idle'; refreshSyncPill(); return; }
  const connected = await getSetting('gdrive.connected', false);
  if(!connected && !allowInteractive){ state.sync.status='not-connected'; refreshSyncPill(); return; }
  if(!navigator.onLine){ state.sync.status='offline'; state.sync.pendingOffline=true; refreshSyncPill(); return; }

  syncInProgress=true; state.sync.status='syncing'; refreshSyncPill();
  try{
    const token = await getValidAccessToken(clientId);
    if(!connected){ await setSetting('gdrive.connected', true); state.sync.connected=true; }

    let fileId = await getSetting('gdrive.fileId', null);
    let remoteText = null;
    if(fileId){
      try{ remoteText = await driveDownloadFile(token, fileId); }
      catch(e){ console.warn('雲端檔讀取失敗,重新定位',e); fileId=null; await setSetting('gdrive.fileId', null); }
    }
    if(!fileId){
      fileId = await driveFindFile(token);
      if(fileId){ await setSetting('gdrive.fileId', fileId); remoteText = await driveDownloadFile(token, fileId); }
    }
    let remoteChangedLocal=false;
    if(remoteText){
      let remoteParsed=null;
      try{ remoteParsed=JSON.parse(remoteText); }catch(e){ /* 壞檔忽略,視同無遠端資料 */ }
      if(remoteParsed && remoteParsed.data){
        const plan = await computeMergePlan(remoteParsed);
        for(const st of EXPORT_STORES){ for(const rec of plan.plan[st]){ await idbPut(st, rec); } }
        for(const kv of plan.settings){ if(kv && kv.key!=null && !SYNC_LOCAL_SETTING_KEYS.has(kv.key)) await idbPut('settings', kv); }
        remoteChangedLocal = (plan.add+plan.upd)>0;
        await refresh();
      }
    }
    const merged = await buildExport();
    const mergedText = JSON.stringify(merged);
    if(!fileId){ fileId = await driveCreateFile(token, mergedText); await setSetting('gdrive.fileId', fileId); }
    else { await driveUpdateFile(token, fileId, mergedText); }

    await setSetting('gdrive.lastSyncAt', now());
    state.sync.lastSyncAt = now();
    state.sync.status='ok'; state.sync.pendingOffline=false; state.sync.lastError=null;
    // 遠端有新資料進來時,無論停在哪個頁面都重繪(設定頁由 finally 統一處理)
    if(remoteChangedLocal && state.view!=='settings'){ render(); toast('已同步雲端更新 ✓'); }
  }catch(err){
    console.warn('雲端同步失敗', err);
    if(isPopupBlockedError(err) && !allowInteractive){
      // 背景自動同步無法彈出授權視窗(瀏覽器擋非手勢彈窗),提示使用者手動觸發一次
      state.sync.status='need-reauth'; state.sync.lastError=null;
      if(!state.sync.reauthToastShown){ state.sync.reauthToastShown=true; toast('雲端同步需重新授權,請至設定點「立即同步」'); }
    } else {
      state.sync.status='error'; state.sync.lastError = err.message||String(err);
    }
  } finally {
    syncInProgress=false;
    refreshSyncPill();
    if(state.view==='settings') render();
  }
}
async function disconnectDrive(){
  const token=state.sync.accessToken;
  if(token && window.google && google.accounts && google.accounts.oauth2 && google.accounts.oauth2.revoke){
    try{ google.accounts.oauth2.revoke(token, ()=>{}); }catch(e){}
  }
  state.sync.accessToken=null; state.sync.tokenExpireAt=0;
  await setSetting('gdrive.token', null);
  await setSetting('gdrive.connected', false); state.sync.connected=false;
  state.sync.status='idle';
  toast('已登出 Google Drive');
  if(state.view==='settings') render();
}
function syncStatusLabel(){
  switch(state.sync.status){
    case 'syncing': return '同步中…';
    case 'ok': return '已同步';
    case 'error': return '同步失敗';
    case 'offline': return '離線・待補同步';
    case 'not-connected': return '尚未連結';
    case 'need-reauth': return '需重新授權';
    default: return state.sync.clientId ? '待同步' : '未設定';
  }
}
function syncPillClass(){
  return state.sync.status==='ok' ? 'ok' : (state.sync.status==='error'||state.sync.status==='offline'||state.sync.status==='need-reauth') ? 'warn' : '';
}
function syncStatusDesc(){
  if(state.sync.status==='error' && state.sync.lastError) return '錯誤:'+state.sync.lastError;
  if(state.sync.status==='need-reauth') return '授權已過期,點「立即同步」重新授權(彈窗會自動關閉)';
  if(!state.sync.clientId) return '請先在下方填入 OAuth Client ID(見 SETUP-GOOGLE-SYNC.md)';
  return state.sync.connected ? '已連結 Google 帳號,資料存於 App 專屬空間(appDataFolder)' : '請按下方「連結」完成 Google 授權';
}
function refreshSyncPill(){
  if(state.view!=='settings') return;
  const p=$('#sync-pill'); if(p){ p.textContent=syncStatusLabel(); p.className='pill '+syncPillClass(); }
  const d=$('#sync-desc'); if(d) d.textContent=syncStatusDesc();
}

function setTheme(th){
  if(th==='auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',th);
  try{ localStorage.setItem('ui.theme',th); }catch(e){}
  updateThemeColor(); render();
}
function updateThemeColor(){
  const dark = document.documentElement.getAttribute('data-theme')==='dark' ||
    (!document.documentElement.getAttribute('data-theme') && matchMedia('(prefers-color-scheme:dark)').matches);
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.content = dark ? '#0f1115' : '#f4f6f9';
}

/* ---------- 帳戶編輯 ---------- */
function openAccountEditor(id){
  const a = id ? state.data.accounts.find(x=>x.id===id) : null;
  const isNew=!a;
  const cur=a?a.currency:'TWD', ty=a?a.type:'bank';
  const html=`
    <h3>${isNew?'新增帳戶':'編輯帳戶'}</h3>
    <div class="field"><label>名稱</label><input type="text" id="a-name" value="${a?escapeHtml(a.name):''}" placeholder="例如 郵局活存"></div>
    <div class="row2">
      <div class="field"><label>類型</label><select id="a-type">${Object.entries(ACCOUNT_TYPES).map(([k,v])=>`<option value="${k}" ${k===ty?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>幣別</label><select id="a-cur">${CURRENCIES.map(c=>`<option ${c===cur?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>初始餘額</label><input type="number" inputmode="decimal" id="a-init" value="${a?a.initialBalance:0}"></div>
    ${ !isNew ? `<div class="set-item" style="padding-left:0;padding-right:0"><div class="lbl">封存此帳戶</div><input type="checkbox" id="a-arch" style="width:auto;transform:scale(1.3)" ${a.archived?'checked':''}></div>` : '' }
    <div class="sheet-actions">
      ${ !isNew ? '<button class="btn-ghost" id="a-cancel">取消</button>' : '<button class="btn-ghost" id="a-cancel">取消</button>' }
      <button class="btn-primary" id="a-save" style="margin-top:0">${isNew?'新增':'儲存'}</button>
    </div>`;
  openSheet(html,()=>{
    $('#a-cancel').onclick=closeSheet;
    $('#a-save').onclick=async()=>{
      const name=$('#a-name').value.trim(); if(!name) return toast('請輸入名稱');
      const rec = a || {id:uid(), sortOrder:state.data.accounts.length, deleted:false};
      rec.name=name; rec.type=$('#a-type').value; rec.currency=$('#a-cur').value;
      rec.initialBalance=parseFloat($('#a-init').value||'0')||0;
      rec.archived = $('#a-arch') ? $('#a-arch').checked : false;
      rec.updatedAt=now();
      await idbPut('accounts',rec); await refresh(); closeSheet(); render(); toast(isNew?'帳戶已新增':'已儲存');
    };
  });
}

/* ---------- 類別管理 ---------- */
function openCategoryManager(kind){
  const render_=()=>{
    const cats=state.data.categories.filter(c=>c.kind===kind&&!c.deleted).sort((a,b)=>a.sortOrder-b.sortOrder);
    return `<h3>${kind==='expense'?'支出':'收入'}類別</h3>
      <div class="card" style="margin-top:8px">${cats.map(c=>`
        <div class="set-item">
          <div class="lbl">${c.icon||''} ${escapeHtml(c.name)} ${c.archived?'<span class="badge-arch">(封存)</span>':''}</div>
          <div style="display:flex;gap:14px"><button class="link" data-ren="${c.id}">改名</button><button class="link" data-arch="${c.id}" style="color:var(--text-dim)">${c.archived?'還原':'封存'}</button></div>
        </div>`).join('')}
      </div>
      <div class="field" style="margin-top:14px"><label>新增類別</label>
        <div class="row2"><input type="text" id="nc-icon" placeholder="圖示 emoji" maxlength="2"><input type="text" id="nc-name" placeholder="名稱"></div>
      </div>
      <button class="btn-primary" id="nc-add">新增類別</button>`;
  };
  const wire=()=>{
    $('#sheet-root .sheet').querySelectorAll('[data-ren]').forEach(b=>b.onclick=()=>{
      const c=state.data.categories.find(x=>x.id===b.dataset.ren);
      const nn=prompt('新名稱',c.name); if(nn&&nn.trim()){ c.name=nn.trim(); c.updatedAt=now(); idbPut('categories',c).then(refresh).then(()=>{ reflow(); }); }
    });
    $('#sheet-root .sheet').querySelectorAll('[data-arch]').forEach(b=>b.onclick=async()=>{
      const c=state.data.categories.find(x=>x.id===b.dataset.arch); c.archived=!c.archived; c.updatedAt=now();
      await idbPut('categories',c); await refresh(); reflow();
    });
    $('#nc-add').onclick=async()=>{
      const name=$('#nc-name').value.trim(); if(!name) return toast('請輸入名稱');
      const icon=$('#nc-icon').value.trim();
      const max=Math.max(0,...state.data.categories.filter(c=>c.kind===kind).map(c=>c.sortOrder||0));
      await idbPut('categories',{id:uid(),name,kind,icon,color:'#94a3b8',sortOrder:max+1,archived:false,updatedAt:now(),deleted:false});
      await refresh(); reflow(); toast('已新增');
    };
  };
  const reflow=()=>{ $('#sheet-root .sheet').innerHTML='<div class="grip"></div>'+render_(); wire(); };
  openSheet(render_(),wire);
}

/* ============================================================
   Sheet / Toast / Confirm
   ============================================================ */
function openSheet(innerHtml,onReady){
  const root=$('#sheet-root');
  root.innerHTML=`<div class="scrim"><div class="sheet"><div class="grip"></div>${innerHtml}</div></div>`;
  const scrim=root.firstElementChild;
  scrim.onclick=e=>{ if(e.target===scrim) closeSheet(); };
  requestAnimationFrame(()=>scrim.classList.add('show'));
  if(onReady) onReady();
}
function closeSheet(){
  const scrim=$('#sheet-root .scrim'); if(!scrim) return;
  scrim.classList.remove('show');
  setTimeout(()=>{ $('#sheet-root').innerHTML=''; },220);
}
function confirmDialog(msg,confirmLabel,onYes){
  const html=`<h3>${msg}</h3><p style="color:var(--text-faint);margin:6px 0 4px">此操作採 tombstone 標記,不會真正抹除紀錄。</p>
    <div class="sheet-actions"><button class="btn-ghost" id="c-no">取消</button><button class="btn-danger" id="c-yes">${confirmLabel}</button></div>`;
  // 疊在既有 sheet 之上:直接替換內容
  const root=$('#sheet-root');
  if(!root.querySelector('.scrim')) openSheet(html); else root.querySelector('.sheet').innerHTML='<div class="grip"></div>'+html;
  $('#c-no').onclick=()=>closeSheet();
  $('#c-yes').onclick=onYes;
}
let toastTimer;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ============================================================
   持久化 / PWA scaffolding
   ============================================================ */
async function requestPersist(){
  if(!navigator.storage || !navigator.storage.persist){ toast('此瀏覽器不支援持久化 API'); state.persistState='unknown'; return; }
  try{
    const already=await navigator.storage.persisted();
    const granted = already || await navigator.storage.persist();
    state.persistState = granted ? 'persisted' : 'best-effort';
    toast(granted?'已取得持久化儲存 ✓':'瀏覽器暫以盡力方式保存');
  }catch(e){ state.persistState='unknown'; toast('申請失敗'); }
  if(state.view==='settings') render();
}
function setupManifest(){
  // 動態產生 manifest(允許以 Blob URL 提供),圖示用 SVG data URI
  const icon = 'data:image/svg+xml,'+encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#2563eb"/><text x="256" y="340" font-size="300" text-anchor="middle" fill="#fff" font-family="sans-serif">記</text></svg>`);
  const manifest={ name:"個人記帳", short_name:"記帳", start_url:".", scope:".", display:"standalone",
    background_color:"#0f1115", theme_color:"#0f1115", orientation:"portrait",
    icons:[{src:icon,sizes:"any",type:"image/svg+xml",purpose:"any maskable"}] };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
}

/* Service Worker:瀏覽器規定 SW 必須是真實 URL,無法用 Blob/Data URL 註冊。
   因此外殼離線需要一支同目錄的 sw.js(可在設定頁一鍵下載)。 */
const SW_SOURCE = `const CACHE='ledger-v5';
self.addEventListener('install',function(e){ e.waitUntil(caches.open(CACHE).then(function(c){return c.add('./');}).catch(function(){}).then(function(){return self.skipWaiting();})); });
self.addEventListener('activate',function(e){ e.waitUntil((async function(){ var ks=await caches.keys(); await Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);})); await self.clients.claim(); })()); });
self.addEventListener('fetch',function(e){ var req=e.request; if(req.method!=='GET') return; var sameOrigin=new URL(req.url).origin===self.location.origin;
if(!sameOrigin){ if(req.destination!=='script') return; e.respondWith((async function(){ try{ var res=await fetch(req); if(res&&(res.status===200||res.type==='opaque')){ var c=await caches.open(CACHE); c.put(req,res.clone()); } return res; }catch(err){ var cached=await caches.match(req); if(cached) return cached; throw err; } })()); return; }
e.respondWith((async function(){ var cached=await caches.match(req); if(cached) return cached; try{ var res=await fetch(req); if(res&&res.status===200&&(res.type==='basic'||res.type==='default')){ var c=await caches.open(CACHE); c.put(req,res.clone()); } return res; }catch(err){ if(req.mode==='navigate'){ var fb=await caches.match('./'); if(fb) return fb; } throw err; } })()); });
`;
function isSecureCtx(){ return (typeof isSecureContext!=='undefined'&&isSecureContext) || location.protocol==='https:' || ['localhost','127.0.0.1'].includes(location.hostname); }
function refreshSwPill(){ if(state.view==='settings'){ const p=$('#sw-pill'); if(p){ p.textContent=swLabel(); p.className='pill '+(state.swState==='active'?'ok':(state.swState==='insecure'||state.swState==='nofile'?'warn':'')); } } }
async function registerSW(){
  if(!('serviceWorker' in navigator)){ state.swState='unsupported'; return refreshSwPill(); }
  if(!isSecureCtx()){ state.swState='insecure'; return refreshSwPill(); }   // SW 需安全環境(HTTPS 或 localhost)
  try{
    const reg=await navigator.serviceWorker.register('./sw.js',{scope:'./'});
    state.swState = reg.active ? 'active' : 'registered'; refreshSwPill();
    navigator.serviceWorker.ready.then(()=>{ state.swState='active'; refreshSwPill(); });
  }catch(err){
    state.swState='nofile'; console.warn('SW 未註冊(可能尚未部署 sw.js):',err); refreshSwPill();
  }
}
function downloadSW(){
  const blob=new Blob([SW_SOURCE],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='sw.js'; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
  toast('sw.js 已下載 · 放到與本檔同目錄');
}

/* ============================================================
   啟動
   ============================================================ */
async function boot(){
  try{
    await openDB();
    await seedIfEmpty();
    // 還原持久化的 Drive token(1 小時效期內重開 App 不必重新授權)
    const tok=await getSetting('gdrive.token', null);
    if(tok && tok.accessToken && tok.expireAt > now()){
      state.sync.accessToken=tok.accessToken; state.sync.tokenExpireAt=tok.expireAt;
    }
    await refresh();
    // 記憶上次帳戶/類別
    state.entry.accountId = await getSetting('ui.lastAccountId', null);
    if(!state.entry.accountId || !acctById(state.entry.accountId)){
      const first=activeAccounts().filter(a=>!a.archived)[0]; state.entry.accountId=first?first.id:null;
    }
    const lec=await getSetting('ui.lastExpenseCat',null);
    state.entry.categoryId = (lec && catById(lec) && !catById(lec).deleted) ? lec : lastCat('expense');
    setupManifest();
    updateThemeColor();
    // 持久化(靜默申請,結果顯示在設定頁)
    if(navigator.storage && navigator.storage.persisted){
      const p=await navigator.storage.persisted();
      state.persistState = p ? 'persisted' : 'best-effort';
      if(!p && navigator.storage.persist){ try{ const g=await navigator.storage.persist(); state.persistState=g?'persisted':'best-effort'; }catch(e){} }
    }
    render();
    registerSW();
  }catch(err){
    console.error(err);
    $('#view').innerHTML=`<div class="empty"><div class="big">⚠️</div><p>初始化失敗</p><p style="font-size:13px">${escapeHtml(err.message||err)}</p></div>`;
  }
}

// 導覽列
$('#nav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-nav]'); if(!b) return;
  state.view=b.dataset.nav; render();
});
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{ updateThemeColor(); if(!document.documentElement.getAttribute('data-theme')) render(); });

// 離線時記帳不受影響;恢復連線後自動補同步
window.addEventListener('online', ()=>{ syncNow().catch(()=>{}); });
window.addEventListener('offline', ()=>{ state.sync.status='offline'; refreshSyncPill(); });

// App 回到前景時拉取遠端更新(否則另一台裝置的新資料不會出現)。60 秒節流避免頻繁下載。
let lastFocusSyncAt=0;
function focusSync(){
  if(!state.sync.connected || syncInProgress) return;
  if(now()-lastFocusSyncAt < 60000) return;
  lastFocusSyncAt=now();
  syncNow().catch(()=>{});
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') focusSync(); });
window.addEventListener('focus', focusSync);

boot();
</script>
