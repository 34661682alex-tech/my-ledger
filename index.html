<!DOCTYPE html>
<html lang="zh-Hant" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記帳">
<title>個人記帳</title>
<script>
/* 早期套用主題,避免深色/淺色閃爍(FOUC)。主題偏好非主要資料,允許存 localStorage。 */
(function(){try{var t=localStorage.getItem('ui.theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<style>
:root{
  --bg:#f4f6f9; --surface:#ffffff; --surface-2:#eef1f5; --surface-3:#e5e9ef;
  --text:#171a1f; --text-dim:#6b7280; --text-faint:#9aa1ab;
  --border:#e2e6ec; --accent:#2563eb; --accent-soft:#dbe7ff;
  --income:#15803d; --income-bg:#e7f6ec;
  --expense:#c81e1e; --expense-bg:#fdeaea;
  --transfer:#7c3aed; --transfer-bg:#f0e9fd;
  --invest:#b45309; --invest-bg:#fbf0e2;
  --shadow:0 1px 3px rgba(20,24,33,.08),0 1px 2px rgba(20,24,33,.04);
  --shadow-lg:0 12px 40px rgba(20,24,33,.18);
  --nav-h:60px;
}
:root[data-theme="dark"]{
  --bg:#0f1115; --surface:#181b21; --surface-2:#20242c; --surface-3:#2a2f38;
  --text:#e8eaed; --text-dim:#9aa1ab; --text-faint:#6b7280;
  --border:#2a2f38; --accent:#3b82f6; --accent-soft:#1e2a45;
  --income:#4ade80; --income-bg:#12331f;
  --expense:#f87171; --expense-bg:#3a1717;
  --transfer:#a78bfa; --transfer-bg:#271b40;
  --invest:#fbbf24; --invest-bg:#33260f;
  --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 12px 40px rgba(0,0,0,.55);
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:#0f1115; --surface:#181b21; --surface-2:#20242c; --surface-3:#2a2f38;
    --text:#e8eaed; --text-dim:#9aa1ab; --text-faint:#6b7280;
    --border:#2a2f38; --accent:#3b82f6; --accent-soft:#1e2a45;
    --income:#4ade80; --income-bg:#12331f;
    --expense:#f87171; --expense-bg:#3a1717;
    --transfer:#a78bfa; --transfer-bg:#271b40;
    --invest:#fbbf24; --invest-bg:#33260f;
    --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 12px 40px rgba(0,0,0,.55);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",Roboto,sans-serif;
  font-size:15px; line-height:1.45; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text)}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* Layout */
#app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
header.top{
  position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(env(safe-area-inset-top) + 12px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
header.top h1{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em}
header.top .sub{font-size:12px;color:var(--text-faint);font-weight:500}
#view{flex:1;padding:4px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px)}

/* Bottom nav */
nav.tab{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  max-width:520px;margin:0 auto;
  background:var(--surface);border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -1px 8px rgba(0,0,0,.04);
}
nav.tab button{
  height:var(--nav-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-faint);font-size:11px;font-weight:600;
}
nav.tab button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
nav.tab button.on{color:var(--accent)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
.section-label{font-size:12px;font-weight:700;color:var(--text-faint);letter-spacing:.04em;text-transform:uppercase;margin:18px 2px 8px}

/* Entry type segmented */
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:3px;gap:2px;margin:2px 0 14px}
.seg button{flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:600;color:var(--text-dim);transition:.15s}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.seg button.on[data-t="expense"]{color:var(--expense)}
.seg button.on[data-t="income"]{color:var(--income)}
.seg button.on[data-t="transfer"]{color:var(--transfer)}

/* Amount display */
.amt-wrap{text-align:center;padding:10px 0 4px}
.amt-cur{font-size:13px;color:var(--text-faint);font-weight:600;margin-bottom:2px}
.amt{font-size:44px;font-weight:700;letter-spacing:-.02em;min-height:52px;line-height:1}
.amt.expense{color:var(--expense)} .amt.income{color:var(--income)} .amt.transfer{color:var(--transfer)}
.amt .z{color:var(--text-faint)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:8px 13px;border-radius:11px;background:var(--surface-2);
  font-size:14px;font-weight:600;color:var(--text-dim);border:1.5px solid transparent;
  display:inline-flex;align-items:center;gap:6px;
}
.chip.on{border-color:var(--accent);color:var(--text);background:var(--accent-soft)}
.chip .dot{width:9px;height:9px;border-radius:50%}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.keypad button{
  height:52px;border-radius:13px;background:var(--surface);border:1px solid var(--border);
  font-size:22px;font-weight:600;box-shadow:var(--shadow);transition:.08s;
}
.keypad button:active{transform:scale(.96);background:var(--surface-2)}
.keypad button.wide{grid-column:span 1}
.btn-primary{
  width:100%;padding:15px;border-radius:14px;background:var(--accent);color:#fff;
  font-size:16px;font-weight:700;margin-top:14px;box-shadow:var(--shadow);transition:.1s;
}
.btn-primary:active{transform:scale(.99);filter:brightness(.95)}
.btn-primary:disabled{opacity:.45}
.btn-ghost{width:100%;padding:13px;border-radius:12px;background:var(--surface-2);color:var(--text-dim);font-weight:600;font-size:15px}

/* form fields */
.field{margin:12px 0}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-faint);margin:0 2px 6px;letter-spacing:.02em}
.field input,.field select,.field textarea{
  width:100%;padding:12px 13px;border-radius:12px;background:var(--surface-2);
  border:1.5px solid var(--border);outline:none;transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface)}
.field textarea{resize:none;min-height:44px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* account balances */
.acct-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px}
.acct-row+.acct-row{border-top:1px solid var(--border)}
.acct-name{font-weight:600;display:flex;align-items:center;gap:9px}
.acct-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--text-faint)}
.acct-bal{font-weight:700;font-size:15px}
.neg{color:var(--expense)}

/* list */
.month-nav{display:flex;align-items:center;justify-content:center;gap:18px;padding:6px 0 2px}
.month-nav button{width:36px;height:36px;border-radius:10px;background:var(--surface-2);font-size:18px;color:var(--text-dim)}
.month-nav .ym{font-size:16px;font-weight:700;min-width:104px;text-align:center}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);margin:12px 0;text-align:center}
.stat3 .v{font-size:17px;font-weight:700}
.stat3 .k{font-size:11px;color:var(--text-faint);font-weight:600;margin-top:2px}
.day-group{margin-top:16px}
.day-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 6px;color:var(--text-dim);font-size:12px;font-weight:600}
.tx{display:flex;align-items:center;gap:12px;padding:11px 14px}
.tx+.tx{border-top:1px solid var(--border)}
.tx .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.tx .mid{flex:1;min-width:0}
.tx .t1{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .t2{font-size:12px;color:var(--text-faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .val{font-weight:700;font-size:15px;text-align:right;white-space:nowrap}

.filter-bar{display:flex;gap:8px;overflow-x:auto;padding:4px 0 2px;margin:0 -16px;padding-left:16px;padding-right:16px}
.filter-bar::-webkit-scrollbar{display:none}
.filter-bar select,.filter-bar input{flex:0 0 auto;padding:8px 11px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);font-size:13px;width:auto}

/* empty state */
.empty{text-align:center;padding:54px 24px;color:var(--text-faint)}
.empty .big{font-size:40px;margin-bottom:10px}
.empty p{margin:6px 0}

/* sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;transition:.2s;display:flex;align-items:flex-end;justify-content:center}
.scrim.show{opacity:1}
.sheet{
  width:100%;max-width:520px;background:var(--surface);border-radius:22px 22px 0 0;
  padding:20px 18px calc(env(safe-area-inset-bottom) + 20px);
  transform:translateY(100%);transition:transform .24s cubic-bezier(.32,.72,0,1);
  max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);
}
.scrim.show .sheet{transform:translateY(0)}
.sheet h3{margin:0 0 4px;font-size:18px}
.sheet .grip{width:38px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.sheet-actions button{flex:1}
.btn-danger{padding:13px;border-radius:12px;background:var(--expense-bg);color:var(--expense);font-weight:700;font-size:15px}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:11px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* settings */
.set-item{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;gap:12px}
.set-item+.set-item{border-top:1px solid var(--border)}
.set-item .lbl{font-weight:600}
.set-item .desc{font-size:12px;color:var(--text-faint);margin-top:2px}
.pill{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--surface-2);color:var(--text-dim)}
.pill.ok{background:var(--income-bg);color:var(--income)}
.pill.warn{background:var(--invest-bg);color:var(--invest)}
.seg-sm{display:inline-flex;background:var(--surface-2);border-radius:9px;padding:2px}
.seg-sm button{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text-dim)}
.seg-sm button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.link{color:var(--accent);font-weight:600;font-size:14px}
.mini-add{width:100%;padding:12px;border-radius:12px;border:1.5px dashed var(--border);color:var(--accent);font-weight:600;font-size:14px;margin-top:10px;background:none}
.badge-arch{font-size:11px;color:var(--text-faint);font-style:normal}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div>
      <h1 id="hd-title">個人記帳</h1>
      <div class="sub" id="hd-sub"></div>
    </div>
  </header>
  <main id="view"></main>
</div>

<nav class="tab" id="nav">
  <button data-nav="home" class="on">
    <svg viewBox="0 0 24 24"><path d="M12 4l8 7v9a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-9z" stroke-linejoin="round"/></svg>首頁
  </button>
  <button data-nav="list">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/></svg>明細
  </button>
  <button data-nav="invest">
    <svg viewBox="0 0 24 24"><path d="M4 17l5-5 3 3 7-8" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 7h4v4" stroke-linecap="round" stroke-linejoin="round"/></svg>投資
  </button>
  <button data-nav="report">
    <svg viewBox="0 0 24 24"><path d="M5 20V10M12 20V4M19 20v-7" stroke-linecap="round"/></svg>報表
  </button>
  <button data-nav="settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2" stroke-linecap="round"/></svg>設定
  </button>
</nav>

<div id="toast"></div>
<div id="sheet-root"></div>

<script>
"use strict";
/* ============================================================
   個人記帳 PWA — 第一階段
   資料模型 + IndexedDB 層 + 帳戶管理 + 四型交易輸入 + 交易明細
   單一 HTML 檔・vanilla JS・IndexedDB。
   ============================================================ */

const SCHEMA_VERSION = 1;
const CURRENCIES = ["TWD","USD","JPY","EUR","CNY","HKD","GBP"];
const ACCOUNT_TYPES = {cash:"現金", bank:"銀行", credit:"信用卡", securities:"證券"};

/* ---------- 小工具 ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID()
  : 'id-'+Date.now().toString(36)+Math.random().toString(36).slice(2,10));
const now = ()=> Date.now();
const pad = n => String(n).padStart(2,'0');
function ymd(d=new Date()){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function curYM(){ return ymd().slice(0,7); }
function fmtNum(n){
  const neg = n<0; n = Math.abs(Math.round(n*100)/100);
  const s = n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
  return (neg?'-':'')+s;
}
function money(n,cur){ return (cur && cur!=='TWD' ? cur+' ' : '') + fmtNum(n); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- IndexedDB ---------- */
const DB_NAME='ledger', DB_VER=1;
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      const stores = {accounts:'id',categories:'id',transactions:'id',securities:'id',recurringTemplates:'id',budgets:'id',settings:'key'};
      for(const [name,kp] of Object.entries(stores)){
        if(!d.objectStoreNames.contains(name)){
          const s = d.createObjectStore(name,{keyPath:kp});
          if(name==='transactions'){ s.createIndex('date','date'); s.createIndex('accountId','accountId'); s.createIndex('type','type'); }
        }
      }
    };
    r.onsuccess = e=>{ db=e.target.result; res(db); };
    r.onerror   = e=>rej(e.target.error);
  });
}
function store(name,mode='readonly'){ return db.transaction(name,mode).objectStore(name); }
function idbGetAll(name){ return new Promise((res,rej)=>{ const r=store(name).getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbGet(name,key){ return new Promise((res,rej)=>{ const r=store(name).get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbPut(name,val){ return new Promise((res,rej)=>{ const r=store(name,'readwrite').put(val); r.onsuccess=()=>res(val); r.onerror=()=>rej(r.error); }); }
async function getSetting(k,def){ const v=await idbGet('settings',k); return v?v.value:def; }
async function setSetting(k,value){ return idbPut('settings',{key:k,value}); }

/* ---------- 種子資料 ---------- */
const DEFAULT_ACCOUNTS = [
  {name:"現金", type:"cash", currency:"TWD", initialBalance:0},
  {name:"銀行存款", type:"bank", currency:"TWD", initialBalance:0},
  {name:"信用卡", type:"credit", currency:"TWD", initialBalance:0},
  {name:"證券交割戶", type:"securities", currency:"TWD", initialBalance:0},
];
const DEFAULT_CATS = [
  ["餐飲","expense","🍜","#f59e0b"],["交通","expense","🚗","#3b82f6"],["購物","expense","🛍️","#ec4899"],
  ["居住","expense","🏠","#8b5cf6"],["醫療","expense","💊","#ef4444"],["娛樂","expense","🎮","#06b6d4"],
  ["教育","expense","📚","#10b981"],["保險","expense","🛡️","#6366f1"],["稅費","expense","🧾","#64748b"],
  ["其他","expense","📦","#94a3b8"],
  ["薪資","income","💰","#16a34a"],["獎金","income","🎁","#f59e0b"],["利息","income","🏦","#0ea5e9"],
  ["股利","income","📈","#8b5cf6"],["已實現投資損益","income","💹","#14b8a6"],["其他","income","➕","#94a3b8"],
];
async function seedIfEmpty(){
  const accs = await idbGetAll('accounts');
  if(accs.length===0){
    let i=0;
    for(const a of DEFAULT_ACCOUNTS){
      await idbPut('accounts',{id:uid(),name:a.name,type:a.type,currency:a.currency,initialBalance:a.initialBalance,
        archived:false,sortOrder:i++,updatedAt:now(),deleted:false});
    }
  }
  const cats = await idbGetAll('categories');
  if(cats.length===0){
    let i=0;
    for(const [name,kind,icon,color] of DEFAULT_CATS){
      await idbPut('categories',{id:uid(),name,kind,icon,color,sortOrder:i++,archived:false,updatedAt:now(),deleted:false});
    }
  }
}

/* ---------- 應用狀態 ---------- */
const state = {
  view:'home',
  ym: curYM(),
  entry:{ type:'expense', amount:'', categoryId:null, accountId:null, toAccountId:null, toAmount:'', fee:'', date:ymd(), note:'' },
  filters:{ account:'', category:'', type:'', kw:'' },
  invest:{ mode:'native', showHistory:false, fetching:false, fetchErrors:{}, lastFetchAt:null }, // native | twd
  data:{ accounts:[], categories:[], transactions:[], securities:[], budgets:[], recurringTemplates:[] },
  report:{ trendMonths:6, trendCat:'', distMode:'pie' },
  fxRates:{},                                   // 參考匯率:1 外幣 = X TWD
  derived:{ balances:{}, holdings:[], realizedByTx:{} },
  persistState:'unknown',
  swState:'idle',
  sync:{ status:'idle', lastSyncAt:null, clientId:'', connected:false,
    accessToken:null, tokenExpireAt:0, tokenClient:null, tcClientId:null,
    gisLoaded:false, gisLoadFailed:false, debounceTimer:null, lastError:null, pendingOffline:false },
};

async function refresh(){
  state.data.accounts     = await idbGetAll('accounts');
  state.data.categories   = await idbGetAll('categories');
  state.data.transactions = await idbGetAll('transactions');
  state.data.securities   = await idbGetAll('securities');
  state.data.budgets      = await idbGetAll('budgets');
  state.data.recurringTemplates = await idbGetAll('recurringTemplates');
  state.lastExportAt      = await getSetting('lastExportAt', null);
  state.fxRates           = await getSetting('fxRates', {});
  state.sync.clientId     = await getSetting('gdrive.clientId', '');
  state.sync.connected    = await getSetting('gdrive.connected', false);
  state.sync.lastSyncAt   = await getSetting('gdrive.lastSyncAt', null);
  state.finnhubApiKey     = await getSetting('finnhub.apiKey', '');
  state.fxAutoEnabled     = await getSetting('fx.autoEnabled', true);
  state.fxLastAutoAt      = await getSetting('fx.lastAutoAt', null);
  state.invest.lastFetchAt= await getSetting('prices.lastFetchAt', null);
  recompute();
  scheduleSync();
}

/* ---------- 衍生計算 ---------- */
const activeAccounts = ()=> state.data.accounts.filter(a=>!a.deleted);
const activeCats     = ()=> state.data.categories.filter(c=>!c.deleted);
const activeTx       = ()=> state.data.transactions.filter(t=>!t.deleted);
const activeSecs     = ()=> state.data.securities.filter(s=>!s.deleted);
const acctById = id => state.data.accounts.find(a=>a.id===id);
const catById  = id => state.data.categories.find(c=>c.id===id);
const secById  = id => state.data.securities.find(s=>s.id===id);
const holdingOf = id => state.derived.holdings.find(h=>h.securityId===id);

/* 交易對扣款/入帳帳戶的現金效果(投資買賣本金屬資產移轉) */
function cashEffect(t){
  switch(t.type){
    case 'invest_buy':  return t.price*t.qty + (t.fee||0);         // 買入總成本(費用滿入)
    case 'invest_sell': return t.price*t.qty - (t.fee||0) - (t.tax||0); // 賣出淨額
    default: return t.amount;
  }
}

/* 一次算出:帳戶餘額 + 持股(移動平均、已實現損益)。單一事實來源=交易紀錄 */
function recompute(){
  // 帳戶餘額
  const bal={};
  for(const a of activeAccounts()) bal[a.id]=a.initialBalance||0;
  const add=(id,amt)=>{ if(id!=null && bal[id]!==undefined) bal[id]+=amt; };
  for(const t of activeTx()){
    switch(t.type){
      case 'expense': add(t.accountId,-t.amount); break;
      case 'income':  add(t.accountId,+t.amount); break;
      case 'transfer':
        add(t.accountId,-(t.amount)-(t.fee||0));
        add(t.toAccountId,+(t.toAmount!=null?t.toAmount:t.amount)); break;
      case 'invest_buy':  add(t.accountId,-cashEffect(t)); break;
      case 'invest_sell': add(t.accountId,+cashEffect(t)); break;
      case 'dividend':    add(t.accountId,+t.amount); break;
    }
  }
  state.derived.balances=bal;

  // 投資引擎:逐標的按時序重播,得移動平均成本與已實現損益
  const invTx=activeTx().filter(t=>t.type==='invest_buy'||t.type==='invest_sell'||t.type==='dividend');
  const bySec={};
  for(const t of invTx){ (bySec[t.securityId]=bySec[t.securityId]||[]).push(t); }
  const holdings=[], realizedByTx={};
  for(const [secId,list] of Object.entries(bySec)){
    const sec=secById(secId);
    list.sort((a,b)=> (a.date||'').localeCompare(b.date||'') || (a.updatedAt||0)-(b.updatedAt||0));
    let qty=0, totalCost=0, realized=0, dividends=0;
    for(const t of list){
      if(t.type==='invest_buy'){
        totalCost += t.price*t.qty + (t.fee||0);
        qty += t.qty;
      }else if(t.type==='invest_sell'){
        const avg = qty>1e-9 ? totalCost/qty : 0;
        const net = t.price*t.qty - (t.fee||0) - (t.tax||0);
        const pnl = net - avg*t.qty;
        realized += pnl; realizedByTx[t.id]=pnl;
        totalCost -= avg*t.qty; qty -= t.qty;
        if(qty<1e-9){ qty=0; totalCost=0; }              // 清倉歸零,避免浮點殘留
      }else if(t.type==='dividend'){
        dividends += t.amount;
      }
    }
    const avgCost = qty>1e-9 ? totalCost/qty : 0;
    const currency = sec ? sec.currency : (list[0]?.currency||'TWD');
    let marketValue=null, unrealized=null, unrealizedPct=null;
    if(sec && sec.manualPrice!=null && sec.manualPrice!=='' && qty>1e-9){
      marketValue = sec.manualPrice*qty;
      unrealized  = marketValue - totalCost;
      unrealizedPct = totalCost>0 ? unrealized/totalCost*100 : null;
    }
    holdings.push({securityId:secId, security:sec, qty, avgCost, totalCost, currency,
      marketValue, unrealized, unrealizedPct, realizedTotal:realized, dividendTotal:dividends});
  }
  state.derived.holdings=holdings;
  state.derived.realizedByTx=realizedByTx;
}
/* 讀取快取(給設定頁等使用) */
function accountBalances(){ return state.derived.balances; }

/* 參考匯率:1 外幣 → X TWD;TWD 恆為 1 */
function fxToTwd(cur){ return cur==='TWD' ? 1 : (Number(state.fxRates[cur])||null); }
function toTwd(amount,cur){ const r=fxToTwd(cur); return r==null ? null : amount*r; }

/* 月度收支統計(轉帳本體與投資本金不計入;手續費計為支出;股利/已實現損益計入收入) */
function monthStats(ym){
  let income=0, expense=0;
  for(const t of activeTx()){
    if((t.date||'').slice(0,7)!==ym) continue;
    switch(t.type){
      case 'income':      income  += t.amount; break;
      case 'dividend':    income  += t.amount; break;
      case 'invest_sell': income  += (state.derived.realizedByTx[t.id]||0); break;
      case 'expense':     expense += t.amount; break;
      case 'transfer':    expense += (t.fee||0); break;
    }
  }
  return {income, expense, net:income-expense};
}

/* ---------- 週期性固定收支模板 ---------- */
const WEEKDAYS=['週日','週一','週二','週三','週四','週五','週六'];
const activeTemplates = ()=> state.data.recurringTemplates.filter(t=>!t.deleted);
function scheduleLabel(s){
  if(!s) return '';
  if(s.kind==='monthly') return `每月 ${s.day} 號`;
  if(s.kind==='weekly')  return `每${WEEKDAYS[s.weekday].slice(1)}`;
  return '';
}
function monthLen(y,m){ return new Date(y,m,0).getDate(); } // m:1-12
function scheduledDateThisPeriod(t){
  const s=t.schedule; const d=new Date();
  if(s.kind==='monthly'){
    const y=d.getFullYear(), m=d.getMonth()+1, day=Math.min(s.day, monthLen(y,m));
    return `${y}-${pad(m)}-${pad(day)}`;
  }
  // weekly:本週該星期幾的日期(週一為週首)
  const cur=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const dow=cur.getDay();
  const mondayOffset=(dow===0?-6:1-dow);
  const monday=new Date(cur); monday.setDate(cur.getDate()+mondayOffset);
  const target=new Date(monday); const tOff=(s.weekday===0?6:s.weekday-1);
  target.setDate(monday.getDate()+tOff);
  return ymd(target);
}
function weekRange(){
  const d=new Date(); const cur=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const dow=cur.getDay(); const monday=new Date(cur); monday.setDate(cur.getDate()+(dow===0?-6:1-dow));
  const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
  return [ymd(monday), ymd(sunday)];
}
function isTemplateApplied(t){
  const applied=activeTx().filter(x=>x.templateId===t.id);
  if(t.schedule.kind==='monthly') return applied.some(x=>(x.date||'').slice(0,7)===curYM());
  const [a,b]=weekRange();
  return applied.some(x=>x.date>=a && x.date<=b);
}
function pendingTemplates(){
  return activeTemplates().filter(t=>acctById(t.accountId) && !isTemplateApplied(t));
}

      await idbPut('recurringTemplates',rec); await refresh(); closeSheet(); render(); toast(isNew?'模板已新增':'已儲存');
    };
  });
}
function keypad(k){
  let s=state.entry.amount;
  if(k==='del'){ s=s.slice(0,-1); }
  else if(k==='.'){ if(!s.includes('.')) s=(s||'0')+'.'; }
  else { if(s.includes('.')){ const dec=s.split('.')[1]; if(dec && dec.length>=2) return; }
         if(s.replace('.','').length>=12) return; s+=k; }
  state.entry.amount=s;
  // 只更新金額顯示,避免整頁重繪造成鍵盤閃動
  const el=$('#view .amt'); if(el) el.innerHTML=fmtInputDisplay(s);
  const btn=$('#save-entry'); if(btn) btn.disabled = !(parseFloat(s)>0);
}
function updateFxHint(){
  const h=$('#fx-hint'); if(!h) return;
  const from=acctById(state.entry.accountId), to=acctById(state.entry.toAccountId);
  const a=parseFloat(state.entry.amount||'0'), b=parseFloat(state.entry.toAmount||'0');
  if(from&&to&&a>0&&b>0){ h.textContent=`參考匯率 1 ${from.currency} ≈ ${(b/a).toFixed(4)} ${to.currency}`; }
  else h.textContent='';
}
function lastCat(type){
  const cats=activeCats().filter(c=>c.kind===type&&!c.archived).sort((a,b)=>a.sortOrder-b.sortOrder);
  return cats[0]?cats[0].id:null;

async function saveEntry(){
  const e=state.entry;
  const amt=parseFloat(e.amount);
  if(!(amt>0)) return toast('請輸入金額');
  if(!e.accountId) return toast('請選擇帳戶');
  const acct=acctById(e.accountId);

  if(e.type==='transfer'){
    if(!e.toAccountId) return toast('請選擇目標帳戶');
    const to=acctById(e.toAccountId);
    const cross=acct.currency!==to.currency;
    let toAmount = cross ? parseFloat(e.toAmount) : amt;
    if(cross && !(toAmount>0)) return toast('請輸入目標帳戶入帳金額');
    const fee=parseFloat(e.fee||'0')||0;
    await idbPut('transactions',{
      id:uid(), type:'transfer', date:e.date, amount:amt, currency:acct.currency,
      accountId:e.accountId, toAccountId:e.toAccountId, toAmount, fxRate: cross?(toAmount/amt):null,
      categoryId:null, note:e.note.trim(), fee, updatedAt:now(), deleted:false
    });
  } else {
    if(!e.categoryId) return toast('請選擇類別');
    await idbPut('transactions',{
      id:uid(), type:e.type, date:e.date, amount:amt, currency:acct.currency,
      accountId:e.accountId, categoryId:e.categoryId, note:e.note.trim(),
      updatedAt:now(), deleted:false
    });
    await setSetting(e.type==='expense'?'ui.lastExpenseCat':'ui.lastIncomeCat', e.categoryId);
  }
  await setSetting('ui.lastAccountId', e.accountId);
  // 保留帳戶/類別記憶,清空金額與備註
  state.entry.amount=''; state.entry.note=''; state.entry.fee=''; state.entry.toAmount='';
  await refresh();
  render();
  toast('已儲存 ✓');
}

function shiftYM(ym,delta){
  let [y,m]=ym.split('-').map(Number); m+=delta;
  while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
  return y+'-'+pad(m);
}
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

const MARKETS={tw:'台股', us:'美股', other:'其他'};
const SEC_KINDS={stock:'股票', etf:'ETF', fund:'基金'};

/* ---------- 股價 / 匯率自動更新 ----------
   資料來源(已實測 CORS 可用):
   - 台股:FinMind(免金鑰,每日收盤價,涵蓋上市/上櫃/ETF)
   - 美股:Finnhub(需免費 API Key,即時報價)
   - 匯率:open.er-api.com(免金鑰,每日更新)
   TWSE/TPEX OpenAPI、Yahoo、Stooq 皆無 CORS,瀏覽器端不可用。 */
const PRICE_MIN_INTERVAL = 10*60*1000;   // 自動更新最短間隔 10 分鐘
const PRICE_SOURCES = {auto:'自動(依市場)', finmind:'台股 FinMind', finnhub:'美股 Finnhub', manual:'手動'};

function priceSourceOf(s){
  if(s.dataSource && s.dataSource!=='auto') return s.dataSource;
  return s.market==='tw' ? 'finmind' : s.market==='us' ? 'finnhub' : 'manual';
}
async function fetchPriceFinMind(sym){
  const from=ymd(new Date(now()-12*86400000));
  const url=`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${encodeURIComponent(sym)}&start_date=${from}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
  if(!r.ok) throw new Error('FinMind 回應 '+r.status);
  const j=await r.json();
  if(!j.data || !j.data.length) throw new Error('查無資料,請確認代號');
  const last=j.data[j.data.length-1];
  if(!(last.close>0)) throw new Error('無有效收盤價');
  return {price:last.close, date:last.date};
}
async function fetchPriceFinnhub(sym,key){
  const url=`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${encodeURIComponent(key)}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
  if(r.status===401||r.status===403) throw new Error('Finnhub API Key 無效');
  if(r.status===429) throw new Error('Finnhub 已達流量上限,稍後再試');
  if(!r.ok) throw new Error('Finnhub 回應 '+r.status);
  const j=await r.json();
  if(!(j.c>0)) throw new Error('查無報價,請確認代號');
  return {price:j.c, date:j.t?ymd(new Date(j.t*1000)):ymd()};
}
async function updateFxAuto(){
  const curs=usedForeignCurrencies(); if(!curs.length) return false;
  const r=await fetch('https://open.er-api.com/v6/latest/TWD',{signal:AbortSignal.timeout(15000)});
  if(!r.ok) throw new Error('匯率 API 回應 '+r.status);
  const j=await r.json();
  if(j.result!=='success' || !j.rates) throw new Error('匯率 API 回傳異常');
  const rates=await getSetting('fxRates',{});
  let changed=false;
  for(const c of curs){ if(j.rates[c]>0){ rates[c]=Math.round(1/j.rates[c]*10000)/10000; changed=true; } }
  if(changed){ await setSetting('fxRates',rates); state.fxRates=rates; await setSetting('fx.lastAutoAt',now()); }
  return changed;
}
async function updateAllPrices(force){
  if(state.invest.fetching) return;
  const last=await getSetting('prices.lastFetchAt',0);
  state.invest.lastFetchAt=last||null;
  if(!force && now()-last < PRICE_MIN_INTERVAL) return;
  if(!navigator.onLine){ if(force) toast('目前離線,顯示上次價格'); return; }
  state.invest.fetching=true;
  if(state.view==='invest') render();
  const key=await getSetting('finnhub.apiKey','');
  const targets=activeSecs().filter(s=>priceSourceOf(s)!=='manual');
  const errors={};
  let changed=false;
  for(const s of targets){
    try{
      const src=priceSourceOf(s);
      const sym=(s.autoSymbol||s.symbol||'').trim();
      if(!sym) throw new Error('無代號');
      let res;
      if(src==='finmind') res=await fetchPriceFinMind(sym);
      else { if(!key) throw new Error('未設定 Finnhub API Key(設定頁填入)'); res=await fetchPriceFinnhub(sym,key); }
      // 逐檔獨立寫入:單檔失敗不影響其他檔,舊價保留
      s.manualPrice=res.price; s.manualPriceDate=res.date; s.priceAutoAt=now(); s.updatedAt=now();
      await idbPut('securities',s); changed=true;
    }catch(e){ errors[s.id]=e.message||'更新失敗'; }
  }
  state.invest.fetchErrors=errors;
  await setSetting('prices.lastFetchAt',now()); state.invest.lastFetchAt=now();   // 無論成敗都記,作為節流基準
  try{ if(await getSetting('fx.autoEnabled',true)) await updateFxAuto(); }catch(e){ console.warn('匯率自動更新失敗',e); }
  state.invest.fetching=false;
  if(changed) await refresh();
  if(state.view==='invest') render();
  if(force){ const n=Object.keys(errors).length; toast(n?`價格已更新,${n} 檔失敗`:'價格已更新 ✓'); }
}

  if(n==null) return '0';

  return r.toLocaleString('en-US',{maximumFractionDigits:4});

      const list=groups[cur];
      const cost=list.reduce((s,h)=>s+h.totalCost,0);
      const mv=list.reduce((s,h)=>s+(h.marketValue!=null?h.marketValue:h.totalCost),0);
      const hasPrice=list.some(h=>h.marketValue!=null);
      const upl=mv-cost;
      body += `<div class="section-label" style="display:flex;justify-content:space-between;margin-top:16px">
        <span>${cur==='TWD'?'台幣 TWD':cur}</span>
        <span style="text-transform:none">成本 ${fmtNum(cost)}${hasPrice?` ・市值 ${fmtNum(mv)} ・<span style="color:${pctColor(upl)}">${upl>=0?'+':''}${fmtNum(upl)}</span>`:''}</span>
      </div><div class="card">${list.map(holdingRow).join('')}</div>`;
    }
  }

  const hist = history.length ? `
    <div class="section-label" style="margin-top:20px;display:flex;justify-content:space-between;cursor:pointer" id="iv-hist-h">
      <span>歷史持股 (${history.length})</span><span class="link">${state.invest.showHistory?'收合':'展開'} ${state.invest.showHistory?'▲':'▼'}</span>
    </div>
    ${state.invest.showHistory?`<div class="card">${history.map(historyRow).join('')}</div>`:''}` : '';

  const secMgr=`
    <div class="section-label" style="margin-top:20px">標的管理</div>
    <div class="card">${activeSecs().length?activeSecs().map(s=>`
      <div class="set-item" data-editsec="${s.id}">
        <div><div class="lbl">${escapeHtml(s.symbol)} <span style="color:var(--text-faint);font-weight:400">${escapeHtml(s.name||'')}</span></div>
          <div class="desc">${MARKETS[s.market]||s.market} · ${SEC_KINDS[s.kind]||s.kind} · ${s.currency}${s.manualPrice!=null&&s.manualPrice!==''?` · 現價 ${fmtNum(s.manualPrice)} (${s.manualPriceDate||'—'})`:' · 未設現價'}</div></div>
        <span class="link">編輯 ›</span>
      </div>`).join(''):'<div class="set-item"><div class="desc">尚無標的</div></div>'}
    </div>
    <button class="mini-add" id="iv-addsec">＋ 新增標的</button>`;

  return actions+modeToggle+(body||'<div class="empty" style="padding:30px"><p>目前無持股</p></div>')+hist+secMgr;
}

function holdingRow(h){
  const s=h.security;
  const cur=h.currency;
  const err = s ? state.invest.fetchErrors[s.id] : null;
  const staleTag = (s && err)
    ? ` <span style="color:var(--invest)">⚠ 過時 (${s.manualPriceDate||'—'}):${escapeHtml(err)}</span>`
    : (s && !navigator.onLine && priceSourceOf(s)!=='manual' && s.manualPriceDate)
      ? ` <span style="color:var(--text-faint)">(${s.manualPriceDate} 收盤)</span>` : '';
  const priceInfo = h.marketValue!=null
    ? `<div class="t2">現值 ${money(h.marketValue,cur)} ・<span style="color:${pctColor(h.unrealized)}">${h.unrealized>=0?'+':''}${fmtNum(h.unrealized)}${h.unrealizedPct!=null?` (${h.unrealizedPct>=0?'+':''}${h.unrealizedPct.toFixed(2)}%)`:''}</span>${staleTag}</div>`
    : `<div class="t2" style="color:var(--text-faint)">未設現價${staleTag}</div>`;
  const extra = (h.realizedTotal||h.dividendTotal)
    ? `<div class="t2" style="color:var(--text-faint)">已實現 ${fmtNum(h.realizedTotal)} ・股利 ${fmtNum(h.dividendTotal)}</div>` : '';
  return `<div class="tx" data-secdetail="${h.securityId}" style="align-items:flex-start">
    <div class="ic" style="background:var(--invest-bg);font-size:13px;font-weight:700;color:var(--invest)">${s?escapeHtml(s.symbol.slice(0,4)):'?'}</div>
    <div class="mid">
      <div class="t1">${s?escapeHtml(s.symbol):'—'} <span style="color:var(--text-faint);font-weight:400;font-size:13px">${s?escapeHtml(s.name||''):''}</span></div>
      <div class="t2">${fmtQty(h.qty)} 股 ・均價 ${fmtNum(h.avgCost)} ・成本 ${fmtNum(h.totalCost)}</div>
      ${priceInfo}${extra}
    </div>
  </div>`;
}
function historyRow(h){
  const s=h.security;
  return `<div class="tx" data-secdetail="${h.securityId}">
    <div class="ic" style="background:var(--surface-2);font-size:13px;font-weight:700;color:var(--text-faint)">${s?escapeHtml(s.symbol.slice(0,4)):'?'}</div>
    <div class="mid"><div class="t1">${s?escapeHtml(s.symbol):'—'} <span style="color:var(--text-faint);font-weight:400;font-size:13px">已清倉</span></div>
      <div class="t2">累計已實現 ${fmtNum(h.realizedTotal)} ・股利 ${fmtNum(h.dividendTotal)}</div></div>
  </div>`;
}
function twdOverview(current){
  let cost=0, mv=0, missing=false;
  const rows=current.map(h=>{
    const rate=fxToTwd(h.currency);
    const cTwd = rate!=null ? h.totalCost*rate : null;
    const mvNative = h.marketValue!=null ? h.marketValue : h.totalCost;
    const mvTwd = rate!=null ? mvNative*rate : null;
    if(rate==null) missing=true; else { cost+=cTwd; mv+=mvTwd; }
    const s=h.security;
    return `<div class="tx"><div class="ic" style="background:var(--invest-bg);font-size:13px;font-weight:700;color:var(--invest)">${s?escapeHtml(s.symbol.slice(0,4)):'?'}</div>
      <div class="mid"><div class="t1">${s?escapeHtml(s.symbol):'—'} <span style="color:var(--text-faint);font-size:12px;font-weight:400">${h.currency}</span></div>
        <div class="t2">${rate==null?'<span style="color:var(--expense)">缺參考匯率</span>':`成本 ${fmtNum(cTwd)} ・市值 ${fmtNum(mvTwd)}`}</div></div>
    </div>`;
  }).join('');
  const upl=mv-cost;
  return `<div class="card" style="padding:14px 8px;margin-bottom:10px"><div class="stat3">
      <div><div class="v">${fmtNum(cost)}</div><div class="k">總成本 (TWD)</div></div>
      <div><div class="v">${fmtNum(mv)}</div><div class="k">總市值 (TWD)</div></div>
      <div><div class="v" style="color:${pctColor(upl)}">${upl>=0?'+':''}${fmtNum(upl)}</div><div class="k">未實現損益</div></div>
    </div></div>
    ${missing?'<div class="desc" style="text-align:center;color:var(--invest);margin-bottom:8px">部分標的缺參考匯率,請至設定維護</div>':''}
    <div class="card">${rows}</div>`;
}

function bindInvest(){
  const q=s=>$('#view').querySelector(s);
  const rf=q('#iv-refresh'); if(rf) rf.onclick=()=>updateAllPrices(true);
  updateAllPrices(false);   // 進入投資頁自動更新(10 分鐘節流,離線自動跳過)
  const buy=q('#iv-buy'); if(buy) buy.onclick=()=>openInvestForm('invest_buy');
  const sell=q('#iv-sell'); if(sell) sell.onclick=()=>openInvestForm('invest_sell');
  const div=q('#iv-div'); if(div) div.onclick=()=>openInvestForm('dividend');
  const add=q('#iv-addsec'); if(add) add.onclick=()=>openSecurityEditor(null);
  const mode=q('#iv-mode'); if(mode) mode.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{ state.invest.mode=b.dataset.m; render(); });
  const hh=q('#iv-hist-h'); if(hh) hh.onclick=()=>{ state.invest.showHistory=!state.invest.showHistory; render(); };
  $('#view').querySelectorAll('[data-editsec]').forEach(r=>r.onclick=()=>openSecurityEditor(r.dataset.editsec));
  $('#view').querySelectorAll('[data-secdetail]').forEach(r=>r.onclick=()=>openSecurityDetail(r.dataset.secdetail));
}

/* ---------- 標的編輯 ---------- */
function openSecurityEditor(id){
  const s = id ? secById(id) : null;
  const isNew=!s;
  const html=`
    <h3>${isNew?'新增標的':'編輯標的'}</h3>
    <div class="row2">
      <div class="field"><label>代號</label><input type="text" id="s-sym" value="${s?escapeHtml(s.symbol):''}" placeholder="2330"></div>
      <div class="field"><label>名稱</label><input type="text" id="s-name" value="${s?escapeHtml(s.name||''):''}" placeholder="台積電"></div>
    </div>
    <div class="row2">
      <div class="field"><label>市場</label><select id="s-mkt">${Object.entries(MARKETS).map(([k,v])=>`<option value="${k}" ${s&&s.market===k?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>類型</label><select id="s-kind">${Object.entries(SEC_KINDS).map(([k,v])=>`<option value="${k}" ${s&&s.kind===k?'selected':''}>${v}</option>`).join('')}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label>幣別</label><select id="s-cur">${CURRENCIES.map(c=>`<option ${s&&s.currency===c?'selected':(!s&&c==='TWD'?'selected':'')}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>現價 (選填)</label><input type="number" inputmode="decimal" id="s-price" value="${s&&s.manualPrice!=null?s.manualPrice:''}" placeholder="手動輸入"></div>
    </div>
    <div class="row2">
      <div class="field"><label>價格來源</label><select id="s-src">${Object.entries(PRICE_SOURCES).map(([k,v])=>`<option value="${k}" ${(s&&s.dataSource?s.dataSource:'auto')===k?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>抓價代號 (選填)</label><input type="text" id="s-autosym" value="${s&&s.autoSymbol?escapeHtml(s.autoSymbol):''}" placeholder="預設同代號"></div>
    </div>
    <div class="desc" style="margin:-4px 2px 8px;font-size:12px;color:var(--text-faint)">台股(上市/上櫃/ETF)自動用 FinMind 收盤價;美股用 Finnhub(需在設定頁填 API Key);其他市場請選手動。</div>
    <div class="sheet-actions">
      ${!isNew?'<button class="btn-danger" id="s-del">刪除</button>':'<button class="btn-ghost" id="s-cancel">取消</button>'}
      <button class="btn-primary" id="s-save" style="margin-top:0">${isNew?'新增':'儲存'}</button>
    </div>`;
  openSheet(html,()=>{
    const c=$('#s-cancel'); if(c) c.onclick=closeSheet;
    const d=$('#s-del'); if(d) d.onclick=()=>{
      const h=holdingOf(id);
      if(h && h.qty>1e-9) return toast('尚有持股,無法刪除標的');
      confirmDialog('刪除此標的?相關交易仍保留。','刪除',async()=>{ s.deleted=true; s.updatedAt=now(); await idbPut('securities',s); await refresh(); closeSheet(); render(); toast('已刪除'); });
    };
    $('#s-save').onclick=async()=>{
      const sym=$('#s-sym').value.trim(); if(!sym) return toast('請輸入代號');
      const rec = s || {id:uid(), deleted:false};
      rec.symbol=sym; rec.name=$('#s-name').value.trim();
      rec.market=$('#s-mkt').value; rec.kind=$('#s-kind').value; rec.currency=$('#s-cur').value;
      rec.dataSource=$('#s-src').value; rec.autoSymbol=$('#s-autosym').value.trim()||null;
      const p=$('#s-price').value.trim();
      if(p!==''){ rec.manualPrice=parseFloat(p); rec.manualPriceDate=ymd(); } else if(isNew){ rec.manualPrice=null; rec.manualPriceDate=null; }
      rec.updatedAt=now();
      await idbPut('securities',rec); await refresh(); closeSheet(); render(); toast(isNew?'標的已新增':'已儲存');
    };
  });
}

/* ---------- 標的明細:改現價 + 交易紀錄 ---------- */
function openSecurityDetail(id){
  const s=secById(id); const h=holdingOf(id);
  const txs=activeTx().filter(t=>t.securityId===id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const priceLine = s.manualPrice!=null&&s.manualPrice!==''
    ? `現價 ${money(s.manualPrice,s.currency)} · ${s.manualPriceDate||'—'}` : '尚未設定現價';
  const stat = h ? `
    <div class="card" style="padding:12px 6px;margin:8px 0"><div class="stat3">
      <div><div class="v">${fmtQty(h.qty)}</div><div class="k">持股</div></div>
      <div><div class="v">${fmtNum(h.avgCost)}</div><div class="k">平均成本</div></div>
      <div><div class="v" style="color:${pctColor(h.unrealized)}">${h.unrealized!=null?(h.unrealized>=0?'+':'')+fmtNum(h.unrealized):'—'}</div><div class="k">未實現</div></div>
    </div>
    <div class="stat3" style="margin-top:6px">
      <div><div class="v">${fmtNum(h.totalCost)}</div><div class="k">總成本</div></div>
      <div><div class="v">${fmtNum(h.realizedTotal)}</div><div class="k">累計已實現</div></div>
      <div><div class="v">${fmtNum(h.dividendTotal)}</div><div class="k">累計股利</div></div>
    </div></div>` : '';
  const html=`
    <h3>${escapeHtml(s.symbol)} <span style="font-weight:400;color:var(--text-faint);font-size:15px">${escapeHtml(s.name||'')}</span></h3>
    <div class="desc" style="margin-bottom:4px">${MARKETS[s.market]||s.market} · ${SEC_KINDS[s.kind]||s.kind} · ${s.currency} · ${priceLine}</div>
    ${stat}
    <div class="field"><label>更新現價 (${s.currency})</label>
      <div class="row2"><input type="number" inputmode="decimal" id="d-price" value="${s.manualPrice!=null?s.manualPrice:''}" placeholder="現價"><button class="btn-ghost" id="d-savep">更新現價</button></div>
    </div>
    <div class="section-label" style="margin-top:10px">交易紀錄 (${txs.length})</div>
    <div class="card">${txs.length?txs.map(txRow).join(''):'<div class="set-item"><div class="desc">尚無交易</div></div>'}</div>
    <div class="sheet-actions"><button class="btn-primary" id="d-close" style="margin-top:0">關閉</button></div>`;
  openSheet(html,()=>{
    $('#d-close').onclick=closeSheet;
    $('#d-savep').onclick=async()=>{
      const p=$('#d-price').value.trim();
      s.manualPrice = p===''?null:parseFloat(p);
      s.manualPriceDate = p===''?null:ymd(); s.updatedAt=now();
      await idbPut('securities',s); await refresh(); closeSheet(); render(); toast('現價已更新');
    };
    $('#sheet-root').querySelectorAll('[data-tx]').forEach(r=>r.onclick=()=>{ closeSheet(); setTimeout(()=>openTxEditor(r.dataset.tx),240); });
  });
}

/* ---------- 買入 / 賣出 / 股利 表單(新增或編輯 edit=交易物件) ---------- */
function openInvestForm(type, edit){
  const secs=activeSecs();
  if(!secs.length){ toast('請先新增標的'); return openSecurityEditor(null); }
  const titleMap={invest_buy:'買入',invest_sell:'賣出',dividend:'股利'};
  const isEdit=!!edit;
  // 賣出:只列有持股的標的(編輯時仍含當前標的)
  let secList=secs;
  if(type==='invest_sell'&&!isEdit) secList=secs.filter(s=>{ const h=holdingOf(s.id); return h&&h.qty>1e-9; });
  if(!secList.length){ return toast('目前沒有可賣出的持股'); }
  const curSecId = edit ? edit.securityId : (secList[0]?.id);
  const acctDefault = edit ? edit.accountId : defaultSecuritiesAccount();

  const secOptions = secList.map(s=>`<option value="${s.id}" ${s.id===curSecId?'selected':''}>${escapeHtml(s.symbol)} ${escapeHtml(s.name||'')} (${s.currency})</option>`).join('');
  const acctOptions = activeAccounts().map(a=>`<option value="${a.id}" ${a.id===acctDefault?'selected':''}>${escapeHtml(a.name)} (${a.currency})</option>`).join('');

  let fields='';
  if(type==='dividend'){
    fields=`
      <div class="field"><label>金額</label><input type="number" inputmode="decimal" id="i-amt" value="${edit?edit.amount:''}" placeholder="0"></div>`;
  } else {
    const isSell=type==='invest_sell';
    fields=`
      <div class="row2">
        <div class="field"><label>股數</label><input type="number" inputmode="decimal" id="i-qty" value="${edit?edit.qty:''}" placeholder="0"></div>
        <div class="field"><label>每股成交價</label><input type="number" inputmode="decimal" id="i-price" value="${edit?edit.price:''}" placeholder="0"></div>
      </div>
      <div class="row2">
        <div class="field"><label>手續費</label><input type="number" inputmode="decimal" id="i-fee" value="${edit?(edit.fee||0):0}"></div>
        ${isSell?`<div class="field"><label>證交稅</label><input type="number" inputmode="decimal" id="i-tax" value="${edit?(edit.tax||0):0}"></div>`:'<div></div>'}
      </div>`;
  }

  const html=`
    <h3>${isEdit?'編輯':''}${titleMap[type]}</h3>
    <div class="field"><label>標的</label><select id="i-sec">${secOptions}</select></div>
    ${fields}
    <div class="field" id="i-fx-wrap" style="display:none"><label>當時匯率 (選填,對 TWD)</label><input type="number" inputmode="decimal" id="i-fx" value="${edit&&edit.fxRate?edit.fxRate:''}" placeholder="供 TWD 報表換算"></div>
    <div class="row2">
      <div class="field"><label>日期</label><input type="date" id="i-date" value="${edit?edit.date:ymd()}"></div>
      <div class="field"><label>${type==='invest_buy'?'扣款帳戶':'入帳帳戶'}</label><select id="i-acct">${acctOptions}</select></div>
    </div>
    <div class="field"><label>備註</label><input type="text" id="i-note" value="${edit?escapeHtml(edit.note||''):''}" placeholder="選填"></div>
    <div class="card" style="padding:12px 14px;margin-top:4px"><div id="i-calc" style="font-size:13px;color:var(--text-dim);line-height:1.7"></div></div>
    <div class="sheet-actions">
      ${isEdit?'<button class="btn-danger" id="i-del">刪除</button>':'<button class="btn-ghost" id="i-cancel">取消</button>'}
      <button class="btn-primary" id="i-save" style="margin-top:0">${isEdit?'儲存變更':'新增'+titleMap[type]}</button>
    </div>`;

  openSheet(html,()=>{
    const secSel=$('#i-sec'), calc=$('#i-calc'), fxWrap=$('#i-fx-wrap');
    const updateCalc=()=>{
      const sec=secById(secSel.value);
      if(sec) fxWrap.style.display = sec.currency!=='TWD' ? '' : 'none';
      const cur=sec?sec.currency:'TWD';
      if(type==='dividend'){ const a=parseFloat(($('#i-amt')||{}).value||'0')||0; calc.innerHTML=`入帳 <b>${money(a,cur)}</b> · 記為收入「股利」`; return; }
      const qty=parseFloat($('#i-qty').value||'0')||0, price=parseFloat($('#i-price').value||'0')||0, fee=parseFloat($('#i-fee').value||'0')||0;
      if(type==='invest_buy'){
        const cost=price*qty+fee;
        const h=holdingOf(secSel.value);
        const oldQty=h?h.qty:0, oldCost=h?h.totalCost:0;
        const newAvg=(oldQty+qty)>0?(oldCost+cost)/(oldQty+qty):0;
        calc.innerHTML=`買入總成本 <b>${money(cost,cur)}</b><br>買入後均價 ${fmtNum(newAvg)} ・持股 ${fmtQty(oldQty+qty)}`;
      } else {
        const tax=parseFloat(($('#i-tax')||{}).value||'0')||0;
        const net=price*qty-fee-tax;
        const h=holdingOf(secSel.value);
        const held=h?h.qty:0, avg=h?h.avgCost:0;
        const pnl=net-avg*qty;
        const over=qty>held+1e-9;
        calc.innerHTML=`目前持股 ${fmtQty(held)} ・均價 ${fmtNum(avg)}<br>賣出淨額 <b>${money(net,cur)}</b> ・已實現損益 <b style="color:${pnl<0?'var(--expense)':'var(--income)'}">${pnl>=0?'+':''}${fmtNum(pnl)}</b>`
          + (over?`<br><span style="color:var(--expense)">⚠ 賣出股數超過持股 ${fmtQty(held)}</span>`:'');
      }
    };
    secSel.onchange=updateCalc;
    ['i-qty','i-price','i-fee','i-tax','i-amt'].forEach(id=>{ const el=$('#'+id); if(el) el.oninput=updateCalc; });
    updateCalc();

    const cancel=$('#i-cancel'); if(cancel) cancel.onclick=closeSheet;
    const del=$('#i-del'); if(del) del.onclick=()=>confirmDialog('刪除這筆交易?','刪除',async()=>{
      edit.deleted=true; edit.updatedAt=now(); await idbPut('transactions',edit); await refresh(); closeSheet(); render(); toast('已刪除');
    });

    $('#i-save').onclick=async()=>{
      const sec=secById(secSel.value); if(!sec) return toast('請選擇標的');
      const accId=$('#i-acct').value; const date=$('#i-date').value; const note=$('#i-note').value.trim();
      const fxEl=$('#i-fx'); const fxRate = (fxEl&&fxEl.value.trim()!=='')?parseFloat(fxEl.value):null;
      const base = edit || {id:uid(), deleted:false};
      base.type=type; base.securityId=sec.id; base.currency=sec.currency; base.accountId=accId;
      base.date=date; base.note=note; base.fxRate=fxRate; base.updatedAt=now();

      if(type==='dividend'){
        const amt=parseFloat($('#i-amt').value); if(!(amt>0)) return toast('請輸入金額');
        base.amount=amt;
      } else {
        const qty=parseFloat($('#i-qty').value), price=parseFloat($('#i-price').value);
        const fee=parseFloat($('#i-fee').value||'0')||0;
        if(!(qty>0)) return toast('請輸入股數');
        if(!(price>0)) return toast('請輸入成交價');
        base.qty=qty; base.price=price; base.fee=fee;
        if(type==='invest_buy'){
          base.amount = price*qty+fee;                     // 買入總成本
        } else {
          const tax=parseFloat($('#i-tax').value||'0')||0; base.tax=tax;
          // 驗證持股(編輯賣出時,把自己排除後再算當前持股)
          const h=holdingOf(sec.id);
          let held = h?h.qty:0;
          if(edit){ held += edit.qty; }                    // 還原本筆賣出佔用的股數
          if(qty>held+1e-9) return toast(`賣出股數不得超過持股 ${fmtQty(held)}`);
          const avg = h?h.avgCost:0;
          const net = price*qty-fee-tax;
          base.amount = net;                                // 賣出淨額
          base.realizedPnl = net - avg*qty;                 // 快照,實際計算以引擎為準
        }
      }
      await idbPut('transactions',base); await refresh(); closeSheet(); render();

}

/* ============================================================
   報表與分析(全部手繪 SVG)
   ============================================================ */
const PALETTE=['#2563eb','#16a34a','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#ef4444','#10b981','#6366f1','#f97316','#14b8a6','#64748b'];
function activeBudgets(){ return state.data.budgets.filter(b=>!b.deleted); }
function monthExpenseTotal(ym){ let s=0; for(const t of activeTx()){ if(t.type==='expense'&&(t.date||'').slice(0,7)===ym) s+=t.amount; } return s; }
function monthExpenseByCat(ym,cid){ let s=0; for(const t of activeTx()){ if(t.type==='expense'&&t.categoryId===cid&&(t.date||'').slice(0,7)===ym) s+=t.amount; } return s; }

function donutSVG(segments,opts={}){
  const size=opts.size||150, th=opts.thickness||24;
  const r=(size-th)/2, cx=size/2, cy=size/2, C=2*Math.PI*r;
  const total=segments.reduce((s,x)=>s+x.value,0);
  let acc=0;
  const track=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="${th}"/>`;
  const arcs= total<=0?'':segments.map(seg=>{
    const frac=seg.value/total; const dash=`${frac*C} ${C-frac*C}`; const off=-acc*C; acc+=frac;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${th}" stroke-dasharray="${dash}" stroke-dashoffset="${off}"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><g transform="rotate(-90 ${cx} ${cy})">${track}${arcs}</g></svg>`;
}

function momText(cur,prev,goodUp){
  const diff=cur-prev;
  const pct = prev!==0 ? Math.abs(diff/prev*100) : null;
  const sign = diff>0?'▲':diff<0?'▼':'＝';
  const good = diff===0?null:((diff>0)===goodUp);
  const color = good==null?'var(--text-faint)':(good?'var(--income)':'var(--expense)');
  return `<span style="color:${color}">${sign} ${fmtNum(Math.abs(diff))}${pct!=null?` (${pct.toFixed(0)}%)`:''}</span>`;
}

function trendChart(){
  const N=state.report.trendMonths;
  const list=[]; let cursor=state.ym;
  for(let i=0;i<N;i++){ list.unshift(cursor); cursor=shiftYM(cursor,-1); }
  const cat=state.report.trendCat;
  const rows=list.map(m=>{
    if(cat){ const v=monthExpenseByCat(m,cat); return {label:m.slice(5),single:v,net:0}; }
    const s=monthStats(m); return {label:m.slice(5),income:s.income,expense:s.expense,net:s.net};
  });
  const W=360,H=210,padL=8,padR=8,padT=14,padB=28, plotH=H-padT-padB;
  let vmax=0,vmin=0;
  for(const r of rows){ vmax=Math.max(vmax, cat?r.single:Math.max(r.income,r.expense,r.net)); if(!cat) vmin=Math.min(vmin,r.net,0); }
  if(vmax<=0) vmax=1; const range=(vmax-vmin)||1;
  const map=v=> padT+(vmax-v)/range*plotH;
  const zeroY=map(0), gw=(W-padL-padR)/N;
  let bars='',labels='',dots='';
  rows.forEach((r,i)=>{
    const gx=padL+i*gw+gw/2;
    labels+=`<text x="${gx}" y="${H-10}" text-anchor="middle" font-size="9" fill="var(--text-faint)">${r.label}</text>`;
    if(cat){
      const bw=Math.min(gw*0.5,26), x=gx-bw/2, y=map(r.single);
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(0,zeroY-y)}" rx="3" fill="var(--expense)"/>`;
    }else{
      const bw=Math.min(gw*0.3,15), yi=map(r.income), ye=map(r.expense);
      bars+=`<rect x="${gx-bw-1}" y="${yi}" width="${bw}" height="${Math.max(0,zeroY-yi)}" rx="2" fill="var(--income)"/>`;
      bars+=`<rect x="${gx+1}" y="${ye}" width="${bw}" height="${Math.max(0,zeroY-ye)}" rx="2" fill="var(--expense)"/>`;
      dots+=`<circle cx="${gx}" cy="${map(r.net)}" r="3" fill="var(--accent)"/>`;
    }
  });
  let line='';
  if(!cat){ const pts=rows.map((r,i)=>`${padL+i*gw+gw/2},${map(r.net)}`).join(' '); line=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/>`; }
  const zeroLine=`<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="var(--border)" stroke-width="1"/>`;
  const legend = cat
    ? `<span style="color:var(--expense)">■</span> ${escapeHtml(catById(cat)?.name||'')}`
    : `<span style="color:var(--income)">■</span> 收入 &nbsp;<span style="color:var(--expense)">■</span> 支出 &nbsp;<span style="color:var(--accent)">●</span> 結餘`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${zeroLine}${bars}${line}${dots}${labels}</svg>
    <div style="text-align:center;font-size:11px;color:var(--text-dim);margin-top:2px">${legend}</div>`;
}

function budgetBar(b,ym){
  const limit=b.monthlyLimit||0;
  const spent = b.scope==='total' ? monthExpenseTotal(ym) : monthExpenseByCat(ym,b.scope);
  const pct = limit>0 ? spent/limit*100 : 0;
  const w=Math.min(100,pct);
  const color = pct>100?'var(--expense)':pct>=80?'var(--invest)':'var(--accent)';
  const isTotal=b.scope==='total';
  const label = isTotal?'總支出':(catById(b.scope)?.name||'類別');
  const icon  = isTotal?'📊':(catById(b.scope)?.icon||'');
  return `<div style="margin:10px 0">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
      <span style="font-weight:600">${icon} ${escapeHtml(label)}</span>
      <span class="tnum" style="color:${pct>100?'var(--expense)':'var(--text-dim)'}">${fmtNum(spent)} / ${fmtNum(limit)}${pct>100?` ・超 ${fmtNum(spent-limit)}`:''}</span>
    </div>
    <div style="height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden">
      <div style="height:100%;width:${w}%;background:${color};border-radius:6px;transition:width .3s"></div>
    </div>
  </div>`;
}

function assetOverview(){
  const bal=state.derived.balances;
  const segs=[]; const rows=[]; let total=0, missing=false, idx=0;
  for(const a of activeAccounts().filter(x=>!x.archived)){
    const b = bal[a.id]!==undefined?bal[a.id]:(a.initialBalance||0);
    const tw = toTwd(b,a.currency);
    rows.push({name:a.name, cur:a.currency, raw:b, twd:tw});
    if(tw==null){ missing=true; continue; }
    total += tw;
    if(tw>0){ segs.push({value:tw, color:PALETTE[idx%PALETTE.length], label:a.name}); }
    idx++;
  }
  let holdTwd=0, holdMissing=false;
  for(const h of state.derived.holdings.filter(x=>x.qty>1e-9)){
    const mv = h.marketValue!=null?h.marketValue:h.totalCost;
    const tw = toTwd(mv,h.currency);
    if(tw==null){ holdMissing=true; continue; }
    holdTwd+=tw;
  }
  if(holdTwd>0){ segs.push({value:holdTwd, color:'#b45309', label:'投資持股'}); total+=holdTwd; }

  const donut=donutSVG(segs,{size:150,thickness:24});
  const list = rows.map(r=>`<div class="acct-row" style="padding:10px 14px">
      <div class="acct-name" style="font-weight:500">${escapeHtml(r.name)}${r.cur!=='TWD'?` <span class="acct-badge">${r.cur}</span>`:''}</div>
      <div class="acct-bal tnum ${(r.twd!=null&&r.twd<0)?'neg':''}">${r.twd==null?`<span style="color:var(--expense)">缺匯率</span>`:(r.cur!=='TWD'?`${fmtNum(r.raw)} ≈ ${fmtNum(r.twd)}`:fmtNum(r.twd))}</div>
    </div>`).join('')
    + (holdTwd>0?`<div class="acct-row" style="padding:10px 14px"><div class="acct-name" style="font-weight:500">📈 投資持股</div><div class="acct-bal tnum">${fmtNum(holdTwd)}</div></div>`:'');

  return `<div class="card" style="padding:16px">
    <div style="position:relative;width:150px;height:150px;margin:4px auto 12px">${donut}
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:11px;color:var(--text-faint)">總資產 (TWD)</div>
        <div style="font-size:18px;font-weight:700" class="tnum">${fmtNum(total)}</div>
      </div>
    </div>
    ${(missing||holdMissing)?'<div class="desc" style="text-align:center;color:var(--invest);margin-bottom:6px">部分外幣缺參考匯率,總額未計入</div>':''}
    <div style="border-top:1px solid var(--border)">${list}</div>
  </div>`;
}

function bindReport(){
  const q=s=>$('#view').querySelector(s);

  const n=q('#r-next'); if(n) n.onclick=()=>{ state.ym=shiftYM(state.ym,+1); render(); };
  const dm=q('#r-distmode'); if(dm) dm.querySelectorAll('[data-dm]').forEach(b=>b.onclick=()=>{ state.report.distMode=b.dataset.dm; render(); });
  $('#view').querySelectorAll('[data-drill]').forEach(el=>el.onclick=()=>openCategoryDrill(el.dataset.drill,state.ym));

function openCategoryDrill(cid,ym){
  const cat=catById(cid);
  const txs=activeTx().filter(t=>t.type==='expense'&&t.categoryId===cid&&(t.date||'').slice(0,7)===ym).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=txs.reduce((s,t)=>s+t.amount,0);
  const html=`<h3>${cat?.icon||''} ${escapeHtml(cat?.name||'類別')} · ${ym}</h3>
    <div class="desc" style="margin-bottom:8px">共 ${txs.length} 筆 · 合計 ${fmtNum(total)}</div>

    <div class="sheet-actions"><button class="btn-primary" id="cd-close" style="margin-top:0">關閉</button></div>`;

function openBudgetEditor(){
  const expCats=activeCats().filter(c=>c.kind==='expense'&&!c.archived).sort((a,b)=>a.sortOrder-b.sortOrder);
  const find=scope=>state.data.budgets.find(b=>b.scope===scope&&!b.deleted);
  const bt=find('total');
  const html=`
    <h3>月預算設定</h3>
    <div class="desc" style="margin-bottom:10px">留白代表不設限。預算每月循環套用。</div>
    <div class="field"><label>📊 總支出</label><input type="number" inputmode="decimal" data-bud="total" value="${bt?bt.monthlyLimit:''}" placeholder="不設限"></div>
    ${expCats.map(c=>{ const b=find(c.id); return `<div class="field"><label>${c.icon||''} ${escapeHtml(c.name)}</label><input type="number" inputmode="decimal" data-bud="${c.id}" value="${b?b.monthlyLimit:''}" placeholder="不設限"></div>`; }).join('')}
    <div class="sheet-actions"><button class="btn-ghost" id="bud-cancel">取消</button><button class="btn-primary" id="bud-save" style="margin-top:0">儲存</button></div>`;
  openSheet(html,()=>{
    $('#bud-cancel').onclick=closeSheet;
    $('#bud-save').onclick=async()=>{
      const inputs=$('#sheet-root').querySelectorAll('[data-bud]');
      for(const el of inputs){
        const scope=el.dataset.bud, v=el.value.trim();
        const existing=state.data.budgets.find(b=>b.scope===scope&&!b.deleted);
        if(v===''){ if(existing){ existing.deleted=true; existing.updatedAt=now(); await idbPut('budgets',existing); } continue; }
        const limit=parseFloat(v); if(!(limit>0)) continue;
        if(existing){ existing.monthlyLimit=limit; existing.updatedAt=now(); await idbPut('budgets',existing); }
        else { await idbPut('budgets',{id:uid(),scope,monthlyLimit:limit,updatedAt:now(),deleted:false}); }
      }
      await refresh(); closeSheet(); render(); toast('預算已儲存');
    };
  });
}
